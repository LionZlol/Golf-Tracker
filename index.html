<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Golf Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0b0b0b;
      --panel: #070707; /* darker panel */
      --muted: #8f9699;
      --accent: #6ec36a;
      --glass: rgba(0,0,0,0.45); /* removed bright overlay — darker */
      --card-radius: 12px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: 'Lexend', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,#050608 0%,var(--bg) 100%);
      color:#dfe8ea;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:18px;
    }

    /* layout */
    .app{
      max-width:1100px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:18px;
      align-items:start;
    }

    header{
      grid-column:1 / -1;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    h1{
      margin:0;
      font-size:28px;
      font-weight:700;
      letter-spacing:-0.5px;
    }
    p.lead{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }

    /* main card */
    .card{
      background: var(--panel); /* removed light gradient overlay */
      border-radius:var(--card-radius);
      padding:16px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.7);
      border:1px solid rgba(255,255,255,0.03);
    }

    /* left column content */
    .left{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    form.row{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
      align-items:end;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    input[type="number"], input[type="date"], input[type="text"], select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:var(--glass); /* darker input bg */
      color: #e8eef0;
      outline:none;
      font-size:14px;
    }

    textarea{min-height:54px; resize:vertical}

    .full{grid-column:1 / -1}

    .controls{
      display:flex;
      gap:8px;
      margin-top:6px;
    }
    button{
      cursor:pointer;
      padding:10px 12px;
      border-radius:10px;
      border:0;
      font-weight:600;
      background:linear-gradient(90deg, var(--accent), #4fbf5a);
      color:#05210a;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    }
    button.ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid rgba(255,255,255,0.03);
    }

    /* table */
    .table-wrap{
      overflow-x:auto;
      margin-top:6px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }
    th,td{
      text-align:left;
      padding:10px 8px;
      border-bottom:1px dashed rgba(255,255,255,0.03);
    }
    th{color:var(--muted); font-weight:600; font-size:12px}

    /* right column */
    .right{
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
    }

    .stats-grid{
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:8px;
    }
    .stat{
      padding:12px;
      border-radius:12px;
      background:var(--panel);
      text-align:center;
    }
    .stat strong{display:block; font-size:18px; margin-bottom:4px}
    .muted{color:var(--muted); font-size:12px}

    canvas#history{
      width:100%;
      height:90px;
      display:block;
      border-radius:10px;
      background:var(--panel);
    }

    /* small utilities */
    .small{font-size:12px; color:var(--muted)}
    .center{display:flex; align-items:center; gap:8px}
    .pill{padding:6px 8px; border-radius:999px; background:rgba(255,255,255,0.02); font-size:12px; color:var(--muted)}

    /* responsive */
    @media (max-width:980px){
      .app{grid-template-columns: 1fr; padding-bottom:60px}
      .right{order:2}
    }

    @media (max-width:520px){
      h1{font-size:22px}
      .lead{font-size:12px}
      form.row{grid-template-columns: 1fr}
      .stats-grid{grid-template-columns: 1fr 1fr}
      button{padding:10px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1>Golf Tracker</h1>
        <p class="lead">quickly log rounds, track skills, and more</p>
      </div>
      <div class="center">
        <div class="pill">rounds: <span id="roundCount">0</span></div>
        <button id="clearAll" class="ghost" title="clear all saved rounds">clear</button>
      </div>
    </header>

    <!-- left (main) -->
    <main class="left">
      <section class="card">
        <form id="roundForm" class="row" autocomplete="off">
          <div>
            <label for="date">date</label>
            <input id="date" type="date" class="full" />
          </div>

          <div>
            <label for="course">course</label>
            <input id="course" type="text" />
          </div>

          <div>
            <label for="score">score</label>
            <input id="score" type="number" min="1" max="200" />
          </div>

          <div>
            <label for="putts">putts</label>
            <input id="putts" type="number" min="0" max="99" />
          </div>

          <div>
            <label for="fairways">fairways hit</label>
            <input id="fairways" type="number" min="0" max="18" />
          </div>

          <div>
            <label for="holes">holes played</label>
            <input id="holes" type="number" min="0" max="18" />
          </div>

          <div>
            <label for="notes">notes</label>
            <textarea id="notes" placeholder="optional: club experiment, wind, etc"></textarea>
          </div>

          <div class="full controls">
            <button id="addBtn" type="submit">add round</button>
            <button id="importSample" type="button" class="ghost">import sample</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong>round history</strong>
          <span class="small">most recent first</span>
        </div>
        <div class="table-wrap">
          <table id="roundTable" aria-live="polite">
            <thead>
              <tr>
                <th>date</th>
                <th>course</th>
                <th>score</th>
                <th>putts</th>
                <th>fairways</th>
                <th>holes played</th>
                <th>notes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- right (side) -->
    <aside class="right">
      <section class="card">
        <strong>quick stats</strong>
        <div class="stats-grid" style="margin-top:10px">
          <div class="stat">
            <strong id="avgScore">—</strong>
            <div class="muted">avg score</div>
          </div>
          <div class="stat">
            <strong id="bestScore">—</strong>
            <div class="muted">best score</div>
          </div>
          <div class="stat">
            <strong id="avgPutts">—</strong>
            <div class="muted">avg putts</div>
          </div>
          <div class="stat">
            <strong id="avgHoles">—</strong>
            <div class="muted">avg holes</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong>score history</strong>
          <span class="small">sparkline</span>
        </div>
        <canvas id="history"></canvas>
        <div style="margin-top:8px" class="small">use this for a neat graph; click a table row to remove it.</div>
      </section>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = 'golftracker.rounds.v1';

    const ui = {
      rounds: [],
      els: {},
      init() {
        // cache elements
        this.els = {
          date: document.getElementById('date'),
          course: document.getElementById('course'),
          score: document.getElementById('score'),
          putts: document.getElementById('putts'),
          fairways: document.getElementById('fairways'),
          holes: document.getElementById('holes'),
          notes: document.getElementById('notes'),
          addBtn: document.getElementById('addBtn'),
          roundForm: document.getElementById('roundForm'),
          tbody: document.querySelector('#roundTable tbody'),
          avgScore: document.getElementById('avgScore'),
          bestScore: document.getElementById('bestScore'),
          avgPutts: document.getElementById('avgPutts'),
          avgHoles: document.getElementById('avgHoles'),
          roundCount: document.getElementById('roundCount'),
          clearAll: document.getElementById('clearAll'),
          importSample: document.getElementById('importSample'),
          canvas: document.getElementById('history')
        };

        // defaults
        if(!this.els.date.value){
          this.els.date.valueAsDate = new Date();
        }

        // events
        this.els.roundForm.addEventListener('submit', e => {
          e.preventDefault();
          this.addRoundFromForm();
        });

        this.els.clearAll.addEventListener('click', () => {
          if(confirm('clear all saved rounds?')){
            this.rounds = [];
            this.save();
            this.render();
          }
        });

        this.els.importSample.addEventListener('click', () => {
          this.importSampleData();
        });

        // load
        this.load();
        this.render();
      },

      addRoundFromForm(){
        const date = this.els.date.value || new Date().toISOString().slice(0,10);
        const score = parseInt(this.els.score.value,10);
        if(!score || score <= 0) {
          alert('please enter a valid score');
          return;
        }
        const round = {
          id: Date.now(),
          date,
          course: (this.els.course.value || '').trim(),
          score,
          putts: parseInt(this.els.putts.value || 0,10),
          fairways: parseInt(this.els.fairways.value || 0,10),
          holes: parseInt(this.els.holes.value || 0,10),
          notes: this.els.notes.value || ''
        };
        // add to start (most recent first)
        this.rounds.unshift(round);
        this.save();
        this.render();
        this.els.roundForm.reset();
        this.els.date.valueAsDate = new Date();
      },

      save(){
        try{
          localStorage.setItem(STORAGE_KEY, JSON.stringify(this.rounds));
        }catch(e){
          console.error('save error', e);
        }
      },

      load(){
        const raw = localStorage.getItem(STORAGE_KEY);
        try{
          const parsed = raw ? JSON.parse(raw) : [];
          if(Array.isArray(parsed)) this.rounds = parsed;
        }catch(e){
          console.error('load error',e);
          this.rounds = [];
        }
      },

      render(){
        // update count
        this.els.roundCount.textContent = this.rounds.length;

        // render table
        this.els.tbody.innerHTML = '';
        for(const r of this.rounds){
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${r.date}</td>
            <td>${this.escapeHtml(r.course || '')}</td>
            <td>${r.score}</td>
            <td>${r.putts}</td>
            <td>${r.fairways}</td>
            <td>${r.holes}</td>
            <td>${this.escapeHtml(r.notes).slice(0,60)}</td>
          `;
          // click to remove one round
          tr.addEventListener('click', () => {
            if(confirm('remove this round?')) {
              this.rounds = this.rounds.filter(x => x.id !== r.id);
              this.save();
              this.render();
            }
          });
          this.els.tbody.appendChild(tr);
        }

        // stats
        this.updateStats();

        // chart
        this.drawChart();
      },

      updateStats(){
        const list = this.rounds;
        if(!list.length){
          this.els.avgScore.textContent = '—';
          this.els.bestScore.textContent = '—';
          this.els.avgPutts.textContent = '—';
          this.els.avgHoles.textContent = '—';
          return;
        }
        const scores = list.map(r => r.score);
        const putts = list.map(r => r.putts || 0);
        const holesList = list.map(r => r.holes || 0);

        const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
        const best = Math.min(...scores);
        const avgPutts = (putts.reduce((a,b)=>a+b,0)/putts.length).toFixed(1);
        const totalHolesPlayed = holesList.reduce((a,b)=>a+b,0);
        const avgHoles = (totalHolesPlayed / list.length).toFixed(1);

        this.els.avgScore.textContent = avg;
        this.els.bestScore.textContent = best;
        this.els.avgPutts.textContent = avgPutts;
        this.els.avgHoles.textContent = avgHoles;
      },

      drawChart(){
        const canvas = this.els.canvas;
        const ctx = canvas.getContext('2d');
        // resize for device pixel ratio for crisp lines
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.scale(dpr, dpr);

        // background
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        ctx.fillRect(0,0,w,h);

        if(this.rounds.length === 0) return;

        // take last 12 rounds (most recent first)
        const recent = this.rounds.slice(0,12).map(r => r.score).reverse();
        const max = Math.max(...recent);
        const min = Math.min(...recent);
        const pad = 8;
        const usableW = w - pad*2;
        const usableH = h - pad*2;

        ctx.beginPath();
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(110,195,106,0.95)';
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        recent.forEach((val,i) => {
          const x = pad + (i / (recent.length - 1 || 1)) * usableW;
          // normalize (higher score lower on canvas)
          const t = (val - min) / Math.max(1, (max - min));
          const y = pad + (1 - t) * usableH;
          if(i === 0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
          // draw small dot
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          ctx.beginPath();
          ctx.arc(x,y,3,0,Math.PI*2);
          ctx.fill();
        });

        ctx.stroke();
      },

      importSampleData(){
        // small sample so the user sees how it works
        const sample = [
          { id: Date.now()+1, date: this.iso(-2), course: 'creekside', score:78, putts:30, fairways:9, holes:12, notes:'test: good wind' },
          { id: Date.now()+2, date: this.iso(-9), course: 'ridge links', score:85, putts:34, fairways:6, holes:18, notes:'' },
          { id: Date.now()+3, date: this.iso(-16), course: 'meadow park', score:81, putts:32, fairways:7, holes:9, notes:'new putter' }
        ];
        this.rounds = sample.concat(this.rounds);
        this.save();
        this.render();
      },

      iso(daysAgo=0){
        const d = new Date();
        d.setDate(d.getDate() + daysAgo);
        return d.toISOString().slice(0,10);
      },

      escapeHtml(s = ''){
        return String(s).replace(/[&<>"']/g, function(m){
          return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
        });
      }
    };

    // init
    ui.init();
  </script>
</body>
</html>
